version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: veerha-postgres
    environment:
      POSTGRES_USER: veerha
      POSTGRES_PASSWORD: veerha123
      POSTGRES_DB: veerha_wms_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veerha"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: veerha-adminer
    ports:
      - "8070:8080"
    depends_on:
      - postgres
    environment:
      ADMINER_DEFAULT_SERVER: postgres

volumes:
  postgres_data:
